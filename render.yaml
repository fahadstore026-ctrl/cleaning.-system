services:
  - type: web
    name: cleaning-system
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cleaning-db
          property: connectionString

databases:
  - name: cleaning-db
    databaseName: cleaning_db
    plan: free
    ipAllowList: []
